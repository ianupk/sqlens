  </text>

  <!-- Accent line -->
  <rect x="550" y="258" width="100" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Descriptor -->
  <text x="600" y="290" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" font-weight="500" fill="#475569" text-anchor="middle" letter-spacing="2">
