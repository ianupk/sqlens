<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="185" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    SQL<tspan fill="url(#accent)">ens</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="235" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" text-anchor="middle">
